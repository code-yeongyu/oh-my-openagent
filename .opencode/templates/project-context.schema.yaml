# Project Context Schema
# This schema defines the structure of project-context.yaml files
# Generated by init-project command and provides portable project configuration

# =============================================================================
# SCHEMA DEFINITION
# =============================================================================

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "opencode/project-context"
title: "OpenCode Project Context"
description: "Schema for project context configuration used by AI agents"
version: "1.0.0"

# =============================================================================
# PROJECT INFORMATION
# =============================================================================

project:
  type: object
  description: "Core project metadata"
  required:
    - name
    - type
  properties:
    name:
      type: string
      description: "Project name (used for display and references)"
      example: "my-awesome-app"
    description:
      type: string
      description: "Brief description of the project purpose"
      example: "A web application for managing tasks"
    type:
      type: string
      description: "Primary project type"
      enum:
        - web-app
        - api
        - cli
        - library
        - monorepo
        - mobile
        - desktop
        - other
    version:
      type: string
      description: "Semantic version of the project"
      default: "0.1.0"
      pattern: "^\\d+\\.\\d+\\.\\d+(-[a-zA-Z0-9.]+)?$"

# =============================================================================
# TECHNOLOGY STACK
# =============================================================================

tech_stack:
  type: object
  description: "Technology stack configuration"
  properties:
    languages:
      type: array
      description: "Primary programming languages used"
      items:
        type: object
        required:
          - name
        properties:
          name:
            type: string
            description: "Language name"
            enum:
              - TypeScript
              - JavaScript
              - Python
              - Go
              - Rust
              - Java
              - C#
              - Ruby
              - PHP
              - Swift
              - Kotlin
              - other
          version:
            type: string
            description: "Language version (e.g., '3.12', 'ES2024')"
          primary:
            type: boolean
            description: "Whether this is the primary language"
            default: false

    frameworks:
      type: object
      description: "Framework configurations"
      properties:
        frontend:
          type: object
          nullable: true
          description: "Frontend framework configuration"
          properties:
            name:
              type: string
              enum:
                - React
                - Vue
                - Svelte
                - Angular
                - Next.js
                - Nuxt
                - SvelteKit
                - Remix
                - Astro
                - other
            version:
              type: string
        backend:
          type: object
          nullable: true
          description: "Backend framework configuration"
          properties:
            name:
              type: string
              enum:
                - Express
                - Fastify
                - NestJS
                - Hono
                - FastAPI
                - Django
                - Flask
                - Rails
                - Spring
                - Gin
                - Axum
                - other
            version:
              type: string
        testing:
          type: array
          description: "Testing frameworks"
          items:
            type: object
            properties:
              name:
                type: string
                enum:
                  - Jest
                  - Vitest
                  - Mocha
                  - pytest
                  - Go test
                  - JUnit
                  - RSpec
                  - Playwright
                  - Cypress
                  - other
              type:
                type: string
                enum:
                  - unit
                  - integration
                  - e2e
                  - all
              version:
                type: string

    databases:
      type: array
      description: "Database configurations"
      items:
        type: object
        properties:
          type:
            type: string
            enum:
              - postgresql
              - mysql
              - mongodb
              - sqlite
              - redis
              - dynamodb
              - firestore
              - supabase
              - planetscale
              - other
          name:
            type: string
            description: "Display name or connection alias"
          orm:
            type: string
            description: "ORM/Query builder used"
            enum:
              - Prisma
              - Drizzle
              - TypeORM
              - Sequelize
              - SQLAlchemy
              - Django ORM
              - GORM
              - none
              - other

    package_manager:
      type: string
      description: "Package manager for the primary language"
      enum:
        - npm
        - pnpm
        - yarn
        - bun
        - pip
        - poetry
        - uv
        - cargo
        - go mod
        - maven
        - gradle
        - other

# =============================================================================
# ARCHITECTURE
# =============================================================================

architecture:
  type: object
  description: "Project architecture configuration"
  required:
    - pattern
  properties:
    pattern:
      type: string
      description: "Architectural pattern used"
      enum:
        - layered
        - hexagonal
        - clean
        - feature-based
        - microservices
        - serverless
        - monolithic
        - custom
    
    layers:
      type: array
      description: "Layer definitions (auto-populated based on pattern)"
      items:
        type: object
        required:
          - name
          - path
        properties:
          name:
            type: string
            description: "Layer identifier"
          path:
            type: string
            description: "Relative path from project root"
          description:
            type: string
            description: "Layer purpose and responsibilities"
          agents_md:
            type: boolean
            description: "Whether this layer has an AGENTS.md file"
            default: true

    custom_structure:
      type: object
      nullable: true
      description: "Custom architecture definition (when pattern is 'custom')"
      properties:
        name:
          type: string
          description: "Name of the custom pattern"
        description:
          type: string
          description: "Description of the pattern"
        layers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              path:
                type: string
              description:
                type: string
              dependencies:
                type: array
                items:
                  type: string
                description: "Other layers this layer may depend on"
              restrictions:
                type: array
                items:
                  type: string
                description: "Layers this layer must NOT depend on"

# =============================================================================
# INTEGRATIONS
# =============================================================================

integrations:
  type: object
  description: "External service integrations"
  properties:
    linear:
      type: object
      description: "Linear project management integration"
      properties:
        enabled:
          type: boolean
          default: false
        team_id:
          type: string
          description: "Linear team identifier"
        project_id:
          type: string
          description: "Linear project identifier"
        labels:
          type: array
          items:
            type: string
          description: "Default labels to apply to issues"
        workflow:
          type: object
          properties:
            require_issue:
              type: boolean
              description: "Require Linear issue for all work"
              default: true
            auto_transition:
              type: boolean
              description: "Auto-transition issues based on PR status"
              default: false

    mintlify:
      type: object
      description: "Mintlify documentation integration"
      properties:
        enabled:
          type: boolean
          default: false
        docs_path:
          type: string
          description: "Path to documentation directory"
          default: "docs/"
        config_file:
          type: string
          description: "Mintlify config file path"
          default: "mint.json"

    github:
      type: object
      description: "GitHub repository integration"
      properties:
        repo:
          type: string
          description: "Repository in owner/repo format"
        default_branch:
          type: string
          default: "main"
        pr_template:
          type: boolean
          description: "Use PR template"
          default: true
        issue_templates:
          type: boolean
          description: "Use issue templates"
          default: true
        actions:
          type: boolean
          description: "GitHub Actions enabled"
          default: true

    ci_cd:
      type: object
      description: "CI/CD configuration"
      properties:
        provider:
          type: string
          enum:
            - github-actions
            - gitlab-ci
            - circleci
            - jenkins
            - other
            - none
        config_path:
          type: string
          description: "CI configuration file path"

# =============================================================================
# CONVENTIONS
# =============================================================================

conventions:
  type: object
  description: "Coding conventions and style guidelines"
  properties:
    naming:
      type: object
      description: "Naming conventions"
      properties:
        files:
          type: string
          enum:
            - kebab-case
            - snake_case
            - camelCase
            - PascalCase
          default: "kebab-case"
        functions:
          type: string
          enum:
            - camelCase
            - snake_case
            - PascalCase
          default: "camelCase"
        classes:
          type: string
          enum:
            - PascalCase
            - camelCase
          default: "PascalCase"
        constants:
          type: string
          enum:
            - SCREAMING_SNAKE_CASE
            - camelCase
            - PascalCase
          default: "SCREAMING_SNAKE_CASE"
        components:
          type: string
          enum:
            - PascalCase
            - kebab-case
          default: "PascalCase"
          description: "UI component naming (for frontend)"

    code_style:
      type: object
      description: "Code formatting rules"
      properties:
        indent:
          type: integer
          enum: [2, 4]
          default: 2
        indent_style:
          type: string
          enum:
            - spaces
            - tabs
          default: "spaces"
        quotes:
          type: string
          enum:
            - single
            - double
          default: "double"
        semicolons:
          type: boolean
          default: true
        trailing_commas:
          type: boolean
          default: true
        max_line_length:
          type: integer
          default: 100
        formatter:
          type: string
          enum:
            - prettier
            - eslint
            - black
            - ruff
            - gofmt
            - rustfmt
            - other
            - none

    commit_format:
      type: string
      description: "Commit message format"
      enum:
        - conventional
        - angular
        - gitmoji
        - custom
        - none
      default: "conventional"

    commit_scopes:
      type: array
      description: "Valid commit scopes for conventional commits"
      items:
        type: string
      example:
        - feat
        - fix
        - docs
        - style
        - refactor
        - test
        - chore

    branch_naming:
      type: string
      description: "Branch naming pattern"
      default: "{type}/{issue-id}-{description}"
      example: "feature/LINEAR-123-add-auth"

# =============================================================================
# METADATA
# =============================================================================

metadata:
  type: object
  description: "File metadata (auto-generated)"
  properties:
    created_at:
      type: string
      format: date-time
      description: "ISO 8601 timestamp of creation"
    updated_at:
      type: string
      format: date-time
      description: "ISO 8601 timestamp of last update"
    opencode_version:
      type: string
      description: "Version of OpenCode that generated this file"
    schema_version:
      type: string
      description: "Version of this schema"
      default: "1.0.0"


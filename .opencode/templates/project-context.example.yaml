# .opencode/project-context.yaml
# Example project context configuration
# Generated by `init-project` command - customize as needed

project:
  name: "my-awesome-app"
  description: "A modern web application for task management"
  type: "web-app"
  version: "0.1.0"

tech_stack:
  languages:
    - name: "TypeScript"
      version: "5.3"
      primary: true
    - name: "Python"
      version: "3.12"
      primary: false

  frameworks:
    frontend:
      name: "Next.js"
      version: "14.0"
    backend:
      name: "FastAPI"
      version: "0.109"
    testing:
      - name: "Vitest"
        type: "unit"
        version: "1.0"
      - name: "Playwright"
        type: "e2e"
        version: "1.40"

  databases:
    - type: "postgresql"
      name: "main"
      orm: "Prisma"
    - type: "redis"
      name: "cache"
      orm: "none"

  package_manager: "pnpm"

architecture:
  pattern: "layered"
  layers:
    - name: "controllers"
      path: "src/controllers"
      description: "HTTP handlers and request/response logic"
      agents_md: true
    - name: "services"
      path: "src/services"
      description: "Business logic and application rules"
      agents_md: true
    - name: "repositories"
      path: "src/repositories"
      description: "Data access and database operations"
      agents_md: true
    - name: "models"
      path: "src/models"
      description: "Data models and type definitions"
      agents_md: true

integrations:
  linear:
    enabled: true
    team_id: "TEAM-123"
    project_id: "PROJECT-456"
    policy: "optional"  # off | optional | required - controls workflow command behavior
    labels:
      - "feature"
      - "bug"
      - "enhancement"
    workflow:
      require_issue: true
      auto_transition: true

  mintlify:
    enabled: true
    docs_path: "docs/"
    config_file: "mint.json"

  github:
    repo: "myorg/my-awesome-app"
    default_branch: "main"
    pr_template: true
    issue_templates: true
    actions: true

  ci_cd:
    provider: "github-actions"
    config_path: ".github/workflows/"

conventions:
  naming:
    files: "kebab-case"
    functions: "camelCase"
    classes: "PascalCase"
    constants: "SCREAMING_SNAKE_CASE"
    components: "PascalCase"

  code_style:
    indent: 2
    indent_style: "spaces"
    quotes: "double"
    semicolons: true
    trailing_commas: true
    max_line_length: 100
    formatter: "prettier"

  commit_format: "conventional"
  commit_scopes:
    - "feat"
    - "fix"
    - "docs"
    - "style"
    - "refactor"
    - "test"
    - "chore"
  branch_naming: "{type}/{issue-id}-{description}"

metadata:
  created_at: "2024-01-15T10:30:00Z"
  updated_at: "2024-01-15T10:30:00Z"
  opencode_version: "1.0.0"
  schema_version: "1.0.0"


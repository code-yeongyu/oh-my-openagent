name: Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to opencode-lab-clara
    runs-on: [self-hosted, arise]
    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-

      - name: Install dependencies
        run: |
          if [ ! -d node_modules ] || [ ! -f node_modules/.bin/tsc ]; then
            BUN_INSTALL_ALLOW_SCRIPTS="@ast-grep/napi" ~/.bun/bin/bun install --ignore-scripts 2>&1 | tail -5
          else
            echo "node_modules already present, skipping install"
          fi

      - name: Build plugin
        run: ~/.bun/bin/bun run build

      - name: Verify build
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)

      - name: Deploy to server
        run: |
          scp -i ~/.ssh/arise_deploy_key \
            -o StrictHostKeyChecking=no \
            dist/index.js \
            ubuntu@192.168.1.11:/home/ubuntu/oh-my-openagent/dist/index.js

      - name: Verify
        run: |
          ssh -i ~/.ssh/arise_deploy_key \
            -o StrictHostKeyChecking=no \
            ubuntu@192.168.1.11 \
            'ls -lh /home/ubuntu/oh-my-openagent/dist/index.js && echo "Deploy OK"'
